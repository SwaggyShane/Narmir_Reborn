<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Wipe Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0d0e14 0%, #1a1c27 100%);
      color: #e8e9f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1a1c27;
      border: 1px solid #363a52;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #e8e9f0;
    }
    .subtitle {
      font-size: 14px;
      color: #9a9bb5;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9a9bb5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #0d0e14;
      border: 1px solid #363a52;
      border-radius: 8px;
      color: #e8e9f0;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #e05c5c;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: #e05c5c;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    button:hover:not(:disabled) {
      background: #d04a4a;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
    }
    .status.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      display: block;
    }
    .status.error {
      background: rgba(224, 92, 92, 0.1);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: #e05c5c;
      display: block;
    }
    .warning {
      background: rgba(224, 146, 0, 0.1);
      border: 1px solid rgba(224, 146, 0, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #e8b84b;
      line-height: 1.6;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #e8e9f0;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Admin Wipe Panel</h1>
    <p class="subtitle">Clear all players and kingdoms for fresh registration with email requirement.</p>

    <div class="warning">
      ⚠️ <strong>WARNING:</strong> This will permanently delete all players, kingdoms, and related data. This action cannot be undone.
    </div>

    <form id="wipeForm">
      <div class="form-group">
        <label for="secret">Admin Secret</label>
        <input
          type="password"
          id="secret"
          name="secret"
          placeholder="Enter ADMIN_SECRET"
          required
          autocomplete="off"
        />
      </div>

      <button type="submit" id="wipeBtn">Wipe All Data</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById('wipeForm');
    const secretInput = document.getElementById('secret');
    const wipeBtn = document.getElementById('wipeBtn');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const secret = secretInput.value.trim();
      if (!secret) {
        showStatus('Please enter the admin secret', 'error');
        return;
      }

      if (!confirm('⚠️ CRITICAL: Are you absolutely sure you want to WIPE ALL DATA? This will permanently delete all players, kingdoms, and progress. This action cannot be undone.')) {
        return;
      }

      wipeBtn.disabled = true;
      wipeBtn.innerHTML = '<span class="spinner"></span>Wiping...';
      statusEl.className = 'status';

      try {
        const response = await fetch('/api/admin/wipe-players', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret })
        });

        const data = await response.json();

        if (!response.ok) {
          showStatus(data.error || 'Wipe failed', 'error');
        } else {
          showStatus('✅ ' + data.message + ' Ready to register!', 'success');
          secretInput.value = '';
        }
      } catch (err) {
        showStatus('Network error: ' + err.message, 'error');
      } finally {
        wipeBtn.disabled = false;
        wipeBtn.innerHTML = 'Wipe All Data';
      }
    });

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = 'status ' + type;
    }
  </script>
</body>
</html>
