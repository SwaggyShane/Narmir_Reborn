<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stonegradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b8680;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b6560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4540;stop-opacity:1" />
    </linearGradient>
    <filter id="stoneTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#0a0a0b"/>

  <!-- Stone Tower Base -->
  <g filter="url(#shadow)">
    <!-- Main tower body -->
    <rect x="70" y="80" width="116" height="140" fill="url(#stonegradient)" filter="url(#stoneTexture)" />

    <!-- Tower crenellations (top) -->
    <g fill="url(#stonegradient)" filter="url(#stoneTexture)">
      <rect x="70" y="60" width="24" height="20"/>
      <rect x="94" y="70" width="20" height="10"/>
      <rect x="118" y="60" width="20" height="20"/>
      <rect x="142" y="70" width="20" height="10"/>
      <rect x="162" y="60" width="24" height="20"/>
    </g>

    <!-- Stone blocks pattern -->
    <g opacity="0.3" stroke="#2a2520" stroke-width="1">
      <!-- Horizontal lines -->
      <line x1="70" y1="110" x2="186" y2="110"/>
      <line x1="70" y1="140" x2="186" y2="140"/>
      <line x1="70" y1="170" x2="186" y2="170"/>
      <line x1="70" y1="200" x2="186" y2="200"/>
      <!-- Vertical lines -->
      <line x1="93" y1="80" x2="93" y2="220"/>
      <line x1="116" y1="80" x2="116" y2="220"/>
      <line x1="139" y1="80" x2="139" y2="220"/>
      <line x1="162" y1="80" x2="162" y2="220"/>
    </g>

    <!-- Tower windows (dark openings) -->
    <rect x="80" y="100" width="16" height="20" fill="#1a1a1a"/>
    <rect x="105" y="95" width="16" height="20" fill="#1a1a1a"/>
    <rect x="151" y="100" width="16" height="20" fill="#1a1a1a"/>
    <rect x="80" y="155" width="16" height="20" fill="#1a1a1a"/>
    <rect x="160" y="155" width="16" height="20" fill="#1a1a1a"/>

    <!-- Tower shadow/depth -->
    <polygon points="186,80 200,90 200,220 186,220" fill="#2a2520" opacity="0.4"/>
  </g>

  <!-- Gold accent band around tower -->
  <rect x="70" y="115" width="116" height="6" fill="#e8b84b" opacity="0.8" filter="url(#shadow)"/>

  <!-- Letter N (large, gold, epic) -->
  <g filter="url(#shadow)">
    <text x="128" y="145" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#e8b84b" text-anchor="middle" dominant-baseline="middle">N</text>
  </g>

  <!-- Letter R (slightly smaller, positioned below N) -->
  <g filter="url(#shadow)">
    <text x="128" y="185" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#f06202" text-anchor="middle" dominant-baseline="middle">R</text>
  </g>

  <!-- Glowing aura effect -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="#e8b84b" stroke-width="1" opacity="0.2"/>
</svg>