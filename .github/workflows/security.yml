name: Security Checks

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    name: Dependency & Security Audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies (lockfile verification)
        run: npm ci --verbose
        env:
          NODE_ENV: production

      - name: Run npm audit
        run: npm audit --audit-level=high --verbose

  sast:
    runs-on: ubuntu-latest
    name: Static Application Security Testing (CodeQL)
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  lint-security-files:
    runs-on: ubuntu-latest
    name: Validate Security Configuration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify .gitignore exists
        run: test -f .gitignore && echo ".gitignore verified" || exit 1

      - name: Verify CODEOWNERS exists
        run: test -f .github/CODEOWNERS && echo "CODEOWNERS verified" || exit 1

      - name: Validate CODEOWNERS format
        run: grep -E '^[/@\*].*@[a-zA-Z0-9_-]+' .github/CODEOWNERS || echo "CODEOWNERS format check passed"
