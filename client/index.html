<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Narmir Reborn - Pure. Damn. Evil.</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />

    <!-- Tailwind + Global Styles -->
    <link rel="stylesheet" href="/src/tailwind.css" />

    <!-- Error Logging (Keep this) -->
    <script>
      (function() {
        function logErr(message, source, line, col, stack) {
          fetch('/api/log-error', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: String(message), source: String(source), line, col, stack: String(stack) })
          }).catch(() => {});
        }

        window.onerror = function(message, source, lineno, colno, error) {
          const msg = String(message || '');
          if (msg.indexOf('WebSocket') !== -1) return false;
          logErr(msg, source, lineno, colno, error ? error.stack : 'No stacktrace');
          return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
          const error = event.reason;
          const msg = error ? (error.message || String(error)) : 'Unhandled rejection';
          if (msg.indexOf('WebSocket') !== -1) return;
          logErr(msg, 'unhandledrejection', null, null, error ? error.stack : 'No stacktrace');
        });
      })();


      
    </script>
  </head>

  <body class="bg-void-950 text-zinc-200 overflow-hidden">
    <!-- Global Background -->
    <div id="global-bg-container" class="fixed inset-0 z-0 pointer-events-none"></div>

    <!-- Main App Container -->
    <div id="app" class="h-screen w-full overflow-hidden">
      <!-- React will mount everything here via GameShell -->
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
